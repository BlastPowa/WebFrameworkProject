{% extends 'recruitment/base.html' %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg p-4">
                <h2 class="card-title mb-4"><i class="bi bi-briefcase"></i> Apply for {{ job.title }}</h2>
                <p class="text-muted mb-4">
                    <i class="bi bi-info-circle"></i> Your profile information (name, experience, skills) will be sent automatically with this application. Just write your cover letter below.
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label"><i class="bi bi-file-text"></i> Cover Letter</label>
                        <textarea name="cover_letter" class="form-control" rows="8" placeholder="Tell us why you're a great fit for this position" required></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" style="color: white; background: #7c3aed; border: 1px solid #7c3aed;">
                            <i class="bi bi-check-circle"></i> Submit Application
                        </button>
                        <a href="{% url 'job_detail' job.pk %}" class="btn btn-outline-light">
                            <i class="bi bi-x-circle"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
