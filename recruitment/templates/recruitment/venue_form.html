{% extends 'recruitment/base.html' %}

{% block title %}{{ heading }} — PrimeRecruit{% endblock %}

{% block content %}
<div class="pr-card p-4">
    <h1 class="pr-page-title">{{ heading }}</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-3">
                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                {{ field }}
                {% for err in field.errors %}<div class="text-danger small">{{ err }}</div>{% endfor %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-pr-primary">Save</button>
        <a href="{% url 'recruitment:venue_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
