{% extends 'recruitment/base.html' %}

{% block content %}
<div class="hero-glow">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-lock-fill" style="font-size: 2.5rem; color: #7c3aed;"></i>
                        <h2 class="mt-3">Login to PrimeRecruit</h2>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger" role="alert">
                                {{ form.non_field_errors }}
                            </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>
                    <p class="text-center text-muted">New here? <a href="{% url 'register' %}" style="color:#7c3aed;">Register now</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
