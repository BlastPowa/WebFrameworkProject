{% extends 'recruitment/base.html' %}

{% block content %}
<div class="hero-glow">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card p-5 shadow-lg">
                    <div class="text-center mb-4">
                        <i class="bi bi-lock-fill" style="font-size: 2.5rem; color: #7c3aed;"></i>
                        <h2 class="mt-3">Sign In</h2>
                        <p class="text-muted small">Access your PrimeRecruit account</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.non_field_errors %}
                            <div class="alert alert-danger" role="alert">
                                <i class="bi bi-exclamation-circle"></i> {{ form.non_field_errors }}
                            </div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label"><i class="bi bi-person"></i> Username</label>
                            <input type="text" name="username" class="form-control" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label"><i class="bi bi-key"></i> Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </form>
                    <p class="text-center text-muted small">Don't have an account? <a href="{% url 'register' %}" style="color:#7c3aed; font-weight:600;">Register</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
