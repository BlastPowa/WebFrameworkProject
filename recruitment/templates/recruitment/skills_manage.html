{% extends 'recruitment/base.html' %}

{% block content %}
<div class="container my-5">
    <h1 class="mb-4">Manage Skills</h1>
    <div class="row g-3">
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h5>Your Skills</h5>
                {% if candidate.skills.all %}
                    <div class="mt-3">
                        {% for skill in candidate.skills.all %}
                            <form method="post" class="d-inline-block">
                                {% csrf_token %}
                                <input type="hidden" name="remove_skill" value="{{ skill.pk }}">
                                <span class="badge bg-primary me-2">
                                    {{ skill.name }}
                                    <button type="submit" class="btn-close btn-close-white" aria-label="Remove"></button>
                                </span>
                            </form>
                        {% endfor %}
                    </div>
                {% else %}
                    <p class="text-muted">No skills yet</p>
                {% endif %}
            </div>
        </div>
        <div class="col-md-6">
            <div class="card shadow-sm p-4">
                <h5>Add Skill</h5>
                <form method="post" class="mt-3">
                    {% csrf_token %}
                    <div class="mb-3">
                        <select name="skill_id" class="form-select" required>
                            <option value="">Select a skill...</option>
                            {% for skill in available_skills %}
                                <option value="{{ skill.pk }}">{{ skill.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Add</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
